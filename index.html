<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>fabyou</title>
    <style>
        .product-image { padding: 10px; }
        .product-image img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #eee;
        }
        .color-options {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 8px 0;
        }
        .color-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #ddd;
            transition: 0.2s;
        }
        .color-circle:hover { transform: scale(1.2); border-color: #000; }
        .color-circle.selected { border-color: #000; box-shadow: 0 0 0 3px #ccc; }
        .no-products, .loading { text-align: center; padding: 60px 20px; color: #666; }
        .header-hamburger { display: none; font-size: 22px; cursor: pointer; margin-left: 15px; }
        @media (max-width: 768px) {
            .header-hamburger { display: block; }
            header ul {
                display: none; flex-direction: column;
                position: absolute; top: 70px; left: 0; width: 100%;
                background: white; padding: 15px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 999;
            }
            header ul.show { display: flex; }
            header ul li a { padding: 8px 15px; font-size: 15px; }
        }
    </style>
</head>
<body> 
    <header>
        <img src="fabyou.jpg" class="logo" alt="fabyou">
        <ul id="nav-menu">
            <li><a href="#sirves">Collection</a></li>
            <li><a href="#aboutme">About</a></li>
            <li><a href="#contacme">Contact</a></li>
        </ul>
        <a href="card.html" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</a>
        <div class="header-hamburger" onclick="toggleHeaderMenu()"><i class="fas fa-bars"></i></div>
    </header>
    
    <hr>

    <section class="about" id="sirves">
        <div class="hesob">
            <h5>summer collection</h5>
            <h1>New Summer <br> collection 2026</h1>
            <p>Light, fresh, and trendy</p>
            <a href="#main-bnt" class="main-bnt">shop now <i class="fas fa-shopping-cart"></i></a>
        </div>
        <img src="fabyou.jpg" alt="design" class="heroimg">
    </section>
    
    <hr>

    <section class="products" id="main-bnt">
        <div class="loading">⏳ Loading products...</div>
    </section>
    
    <hr>

    <section class="ismme" id="aboutme">
        <h2>About Me</h2>
        <p>Le commerce électronique consiste à acheter et vendre des produits...</p>
    </section>
    
    <hr>

    <section id="contacme" class="contact">
        <div class="contactTitle">
            <h1>contact</h1>
            <h1>me</h1>
        </div>
        <div class="contactme">
            <div class="emaliAndphon">
                <img src="Email.svg" alt="Email">
                <a href="mailto:contact@fabyou.com"><h3>contact@fabyou.com</h3></a>
            </div>
            <div class="emaliAndphon">
                <img src="phone.svg" alt="Phone">
                <a href="tel:+212721010209"><h3>+212721010209</h3></a>
            </div>
        </div>
    </section>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        updateCount();

        const PRODUCTS_URL = "products.json";
        const PLACEHOLDER = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><rect width='200' height='200' fill='%23eee'/><text x='50%25' y='50%25' font-size='20' text-anchor='middle' dy='.3em' fill='%23999'>fabyou</text></svg>";

        // نقراو المنتجات — مع إعادة المحاولة
        async function loadProducts() {
            const container = document.getElementById("main-bnt");
            for (let attempt = 1; attempt <= 3; attempt++) {
                try {
                    const res = await fetch(PRODUCTS_URL + "?t=" + Date.now());
                    if (!res.ok) throw new Error("HTTP " + res.status);
                    let products = await res.json();

                    if (!products || products.length === 0) {
                        container.innerHTML = `<div class="no-products" style="grid-column:1/-1;"><h3>No products yet 🛍️</h3></div>`;
                        return;
                    }

                    container.innerHTML = products.map((p) => `
                        <div class="card">
                            <div class="product-image">
                                <img src="${p.image || PLACEHOLDER}" alt="${p.name}" onerror="this.src='${PLACEHOLDER}'">
                            </div>
                            <h3>${p.name}</h3>
                            <div class="color-options">
                                <div class="color-circle" style="background:#111;" data-color="Black" onclick="selectColor(this)"></div>
                                <div class="color-circle" style="background:#444;" data-color="Gray" onclick="selectColor(this)"></div>
                                <div class="color-circle" style="background:#222;" data-color="Navy" onclick="selectColor(this)"></div>
                            </div>
                            <div class="price-cart">
                                <span>${p.price} DH</span>
                                <button onclick="addToCart(this)">Add to Cart</button>
                            </div>
                        </div>
                    `).join("");
                    return;
                } catch (e) {
                    console.error("Attempt " + attempt + ":", e);
                    if (attempt === 3) {
                        container.innerHTML = `<div class="no-products" style="grid-column:1/-1;"><h3>⚠️ Refresh the page</h3></div>`;
                    }
                    await new Promise(r => setTimeout(r, 1500));
                }
            }
        }

        function selectColor(el) {
            const card = el.closest('.card');
            card.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function addToCart(btn) {
            const card = btn.closest('.card');
            const name = card.querySelector('h3').innerText;
            const price = parseInt(card.querySelector('.price-cart span').innerText);
            const sel = card.querySelector('.color-circle.selected');
            cart.push({ name, price, color: sel ? sel.dataset.color : "Default", size: "M" });
            localStorage.setItem("cart", JSON.stringify(cart));
            updateCount();
            card.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
        }

        function updateCount() {
            const el = document.getElementById("cart-count");
            if (el) el.innerText = cart.length;
        }

        function toggleHeaderMenu() {
            document.getElementById("nav-menu").classList.toggle("show");
        }

        window.onload = function() { loadProducts(); updateCount(); }
    </script>
</body>
</html>
