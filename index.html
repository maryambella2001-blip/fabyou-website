<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- منع المتصفح من تخباء الصفحة (cache) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>fabyou</title>
    <style>
        .product-image { padding: 10px; }
        .product-image img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #eee;
        }
        .color-options {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 8px 0;
        }
        .color-circle {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #ddd;
            transition: 0.2s;
        }
        .color-circle:hover { transform: scale(1.2); border-color: #000; }
        .color-circle.selected { border-color: #000; box-shadow: 0 0 0 3px #ccc; }
        .no-products, .loading { text-align: center; padding: 60px 20px; color: #666; }
        .header-hamburger { display: none; font-size: 22px; cursor: pointer; margin-left: 15px; }
        @media (max-width: 768px) {
            .header-hamburger { display: block; }
            header ul {
                display: none; flex-direction: column;
                position: absolute; top: 70px; left: 0; width: 100%;
                background: white; padding: 15px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 999;
            }
            header ul.show { display: flex; }
            header ul li a { padding: 8px 15px; font-size: 15px; }
        }
    </style>
</head>
<body> 
    <header>
        <img src="fabyou.jpg" class="logo" alt="fabyou">
        <ul id="nav-menu">
            <li><a href="#sirves">Collection</a></li>
            <li><a href="#aboutme">About</a></li>
            <li><a href="#contacme">Contact</a></li>
        </ul>
        <a href="card.html" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</a>
        <div class="header-hamburger" onclick="toggleHeaderMenu()"><i class="fas fa-bars"></i></div>
    </header>
    
    <hr>

    <section class="about" id="sirves">
        <div class="hesob">
            <h5>summer collection</h5>
            <h1>New Summer <br> collection 2026</h1>
            <p>Light, fresh, and trendy</p>
            <a href="#main-bnt" class="main-bnt">shop now <i class="fas fa-shopping-cart"></i></a>
        </div>
        <img src="fabyou.jpg" alt="design" class="heroimg">
    </section>
    
    <hr>

    <!-- تبويبات الكاطيغوري -->
    <div style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap; max-width:1400px; margin:20px auto; padding:0 20px;">
        <button class="tab-btn tab-active" onclick="filterCategory('all', this)" style="background:#2563eb;color:white;border:none;padding:12px 28px;border-radius:25px;cursor:pointer;font-weight:bold;font-size:15px;transition:0.2s;">🛍️ الكل</button>
        <button class="tab-btn" onclick="filterCategory('clothes', this)" style="background:#e5e7eb;color:#374151;border:none;padding:12px 28px;border-radius:25px;cursor:pointer;font-weight:bold;font-size:15px;transition:0.2s;">👕 الملابس</button>
        <button class="tab-btn" onclick="filterCategory('slippers', this)" style="background:#e5e7eb;color:#374151;border:none;padding:12px 28px;border-radius:25px;cursor:pointer;font-weight:bold;font-size:15px;transition:0.2s;">👟 السبدرييلات</button>
    </div>

    <section class="products" id="main-bnt">
        <!-- المنتجات كتجي هنا مباشرة -->
    </section>
    
    <hr>

    <section class="ismme" id="aboutme">
        <h2>About Me</h2>
        <p>Le commerce électronique consiste à acheter et vendre des produits...</p>
    </section>
    
    <hr>

    <section id="contacme" class="contact">
        <div class="contactTitle">
            <h1>contact</h1>
            <h1>me</h1>
        </div>
        <div class="contactme">
            <div class="emaliAndphon">
                <img src="Email.svg" alt="Email">
                <a href="mailto:contact@fabyou.com"><h3>contact@fabyou.com</h3></a>
            </div>
            <div class="emaliAndphon">
                <img src="phone.svg" alt="Phone">
                <a href="tel:+212721010209"><h3>+212721010209</h3></a>
            </div>
        </div>
    </section>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        updateCount();

        let allProducts = []; // كاع المنتجات (محفوظين)
        let currentCategory = "all"; // الكاطيغوري المختار دابا

        // نقراو من GitHub Contents API (فريش - cache غير 60 ثانية)
        // fallback لـ raw ولا Pages إلا فشل
        const API_URL = "https://api.github.com/repos/maryambella2001-blip/fabyou-website/contents/products.json?ref=main&t=";
        const RAW_BASE = "https://raw.githubusercontent.com/maryambella2001-blip/fabyou-website/main/";
        const PLACEHOLDER = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><rect width='200' height='200' fill='%23eee'/><text x='50%25' y='50%25' font-size='20' text-anchor='middle' dy='.3em' fill='%23999'>fabyou</text></svg>";

        // الصور: المسار النسبي → raw (الصور ماشي كتبدل بزاف، cache ماشي مشكل)
        function resolveImage(path) {
            if (!path) return PLACEHOLDER;
            if (path.startsWith("http") || path.startsWith("data:")) return path;
            return RAW_BASE + path + "?t=" + Date.now();
        }

        // فك base64 (مع دعم UTF-8/العربية)
        function decodeBase64(b64) {
            return decodeURIComponent(escape(atob(b64.replace(/\n/g, ""))));
        }

        async function loadProducts() {
            const container = document.getElementById("main-bnt");
            container.innerHTML = '<div class="loading" style="grid-column:1/-1;">⏳ تحميل المنتجات...</div>';
            let products = null;

            // المحاولة 1: Contents API (فريش، cache 60 ثانية فقط)
            try {
                const r1 = await fetch(API_URL + Date.now() + Math.random(), { cache: "no-store" });
                if (r1.ok) {
                    const data = await r1.json();
                    products = JSON.parse(decodeBase64(data.content));
                }
            } catch (e) { console.warn("API فشل:", e.message); }

            // المحاولة 2: raw.githubusercontent (fallback)
            if (!products) {
                try {
                    const r2 = await fetch(RAW_BASE + "products.json?t=" + Date.now(), { cache: "no-store" });
                    if (r2.ok) products = await r2.json();
                } catch (e) { console.warn("raw فشل:", e.message); }
            }

            // المحاولة 3: نفس الأصل Pages (fallback أخير)
            if (!products) {
                try {
                    const r3 = await fetch("products.json?t=" + Date.now(), { cache: "no-store" });
                    if (r3.ok) products = await r3.json();
                } catch (e) { console.warn("Pages فشل:", e.message); }
            }

            if (!products || products.length === 0) {
                allProducts = [];
                container.innerHTML = `<div class="no-products" style="grid-column:1/-1;"><h3>No products yet 🛍️</h3><p>أضف منتجات من لوحة التحكم</p></div>`;
                return;
            }

            // نحفظو المنتجات ونعرضوهم (حسب الكاطيغوري المختار)
            allProducts = products;
            renderProducts();
        }

        // تصفية المنتجات حسب الكاطيغوري
        function filterCategory(cat, btn) {
            currentCategory = cat;
            // تحديث شكل التبويبات (النشط أزرق، الباقي رمادي)
            document.querySelectorAll(".tab-btn").forEach(b => {
                b.style.background = "#e5e7eb";
                b.style.color = "#374151";
            });
            btn.style.background = "#2563eb";
            btn.style.color = "white";

            renderProducts();
        }

        function renderProducts() {
            const container = document.getElementById("main-bnt");
            let products = allProducts;

            // تصفية حسب الكاطيغوري
            if (currentCategory !== "all") {
                products = products.filter(p => (p.category || "clothes") === currentCategory);
            }

            if (!products || products.length === 0) {
                container.innerHTML = `<div class="no-products" style="grid-column:1/-1;"><h3>No products in this category 🛍️</h3></div>`;
                return;
            }

            container.innerHTML = products.map((p) => `
                <div class="card">
                    <div class="product-image">
                        <img src="${resolveImage(p.image)}" alt="${p.name}" onerror="this.src='${PLACEHOLDER}'">
                    </div>
                    <h3>${p.name}</h3>
                    <div class="color-options">
                        <div class="color-circle" style="background:#111;" data-color="Black" onclick="selectColor(this)"></div>
                        <div class="color-circle" style="background:#444;" data-color="Gray" onclick="selectColor(this)"></div>
                        <div class="color-circle" style="background:#222;" data-color="Navy" onclick="selectColor(this)"></div>
                    </div>
                    <div class="price-cart">
                        <span>${p.price} DH</span>
                        <button onclick="addToCart(this)">Add to Cart</button>
                    </div>
                </div>
            `).join("");
        }

        function selectColor(el) {
            const card = el.closest('.card');
            card.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }

        function addToCart(btn) {
            const card = btn.closest('.card');
            const name = card.querySelector('h3').innerText;
            const price = parseInt(card.querySelector('.price-cart span').innerText);
            const sel = card.querySelector('.color-circle.selected');
            cart.push({ name, price, color: sel ? sel.dataset.color : "Default", size: "M" });
            localStorage.setItem("cart", JSON.stringify(cart));
            updateCount();
            card.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
        }

        function updateCount() {
            const el = document.getElementById("cart-count");
            if (el) el.innerText = cart.length;
        }

        function toggleHeaderMenu() {
            document.getElementById("nav-menu").classList.toggle("show");
        }

        window.onload = function() { loadProducts(); updateCount(); }
    </script>
</body>
</html>
