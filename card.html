<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - fabyou</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px 20px;
            background: #f5f5f5;
            margin: 0;
        }
        .cart-wrap {
            max-width: 700px;
            margin: 40px auto 0;
        }
        .cart-title {
            text-align: center;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .cart-item {
            background: white;
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .del-btn {
            background: #e63946;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .del-btn:hover { opacity: 0.85; }
        .total-box {
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: right;
        }
        .checkout-box {
            background: white;
            padding: 25px;
            margin-top: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .checkout-box h3 {
            margin-top: 0;
            margin-bottom: 15px;
        }
        .checkout-box input {
            display: block;
            width: 100%;
            margin-bottom: 12px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .checkout-box input:focus {
            border-color: #000;
            outline: none;
        }
        .checkout-btn {
            width: 100%;
            background: #25D366;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .checkout-btn:hover:not(:disabled) {
            background: #1da851;
        }
        .checkout-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .empty-cart a {
            display: inline-block;
            margin-top: 20px;
            background: #000;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
        }
        .item-info { line-height: 1.5; }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #666;
            text-decoration: none;
        }
        .success-msg {
            background: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="cart-wrap">
        <h1 class="cart-title">🛒 Shopping Cart</h1>

        <div id="content">
            <div id="cart"></div>

            <div class="total-box">
                Total: <span id="total">0</span> DH
            </div>

            <div class="checkout-box">
                <h3>📋 Checkout</h3>
                <input id="name" type="text" placeholder="الاسم الكامل (Full Name)">
                <input id="phone" type="tel" placeholder="رقم الهاتف (Phone Number)">
                <input id="address" type="text" placeholder="العنوان (Address)">
                <input id="city" type="text" placeholder="المدينة (City)">
                <button class="checkout-btn" id="orderBtn" onclick="sendOrder()">
                    <i class="fab fa-whatsapp"></i> Confirm Order via WhatsApp
                </button>
            </div>

            <div class="back-link">
                <a href="index.html">← Continue Shopping</a>
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        const WHATSAPP_NUMBER = "212773300654"; // ← رقمك على واتساب

        function renderCart() {
            const cartDiv = document.getElementById("cart");
            const totalEl = document.getElementById("total");
            const orderBtn = document.getElementById("orderBtn");

            // ✅ FIX: السلة فارغة
            if (cart.length === 0) {
                document.getElementById("content").innerHTML = `
                    <div class="empty-cart">
                        <h2>🛒 السلة فارغة</h2>
                        <p>لم تقم بإضافة أي منتج بعد</p>
                        <a href="index.html">← العودة للتسوق</a>
                    </div>
                `;
                return;
            }

            let total = 0;
            cartDiv.innerHTML = cart.map((item, index) => {
                total += item.price;

                let extra = "";
                if (item.color) extra += `<p><strong>Color:</strong> ${item.color}</p>`;
                if (item.size) extra += `<p><strong>Size:</strong> ${item.size}</p>`;

                return `
                    <div class="cart-item">
                        <div class="item-info">
                            <h3 style="margin:0 0 5px;">${item.name}</h3>
                            <p style="margin:0;"><strong>${item.price} DH</strong></p>
                            ${extra}
                        </div>
                        <button class="del-btn" onclick="removeItem(${index})">Delete</button>
                    </div>
                `;
            }).join("");

            totalEl.innerText = total;
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            renderCart();
        }

        function sendOrder() {
            const name = document.getElementById("name").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const address = document.getElementById("address").value.trim();
            const city = document.getElementById("city").value.trim();
            const orderBtn = document.getElementById("orderBtn");

            // ✅ FIX: التحقق من البيانات
            if (!name) { alert("المرجو إدخال الاسم!"); document.getElementById("name").focus(); return; }
            if (!phone) { alert("المرجو إدخال رقم الهاتف!"); document.getElementById("phone").focus(); return; }
            if (!address) { alert("المرجو إدخال العنوان!"); document.getElementById("address").focus(); return; }

            // ✅ FIX: السلة فارغة
            if (cart.length === 0) {
                alert("السلة فارغة! أضف منتجات أولاً.");
                return;
            }

            // بناء رسالة الطلب
            let message = `🛒 *طلب جديد - fabyou*\n\n`;
            message += `👤 *الاسم:* ${name}\n`;
            message += `📱 *الهاتف:* ${phone}\n`;
            message += `📍 *العنوان:* ${address}\n`;
            if (city) message += `🏙️ *المدينة:* ${city}\n`;
            message += `\n*📦 المنتجات:*\n`;

            let total = 0;
            cart.forEach((item, i) => {
                message += `${i + 1}. ${item.name}`;
                if (item.color) message += ` | ${item.color}`;
                if (item.size) message += ` | ${item.size}`;
                message += ` — *${item.price} DH*\n`;
                total += item.price;
            });

            message += `\n💰 *المجموع: ${total} DH*\n\nشكراً لطلبك! 🙏`;

            // ✅ FIX: نستعملو location.href بدل window.open (ماكيبلوكيهاش المتصفح)
            const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
            
            // نحاولو window.open الأول، إيلا فشل نستعملو location.href
            const newWin = window.open(url, "_blank");
            if (!newWin || newWin.closed || typeof newWin.closed == "undefined") {
                // Popup blocker نشط → نستعملو location.href
                window.location.href = url;
            }

            // ✅ FIX: نمسحو السلة بعد الطلب
            setTimeout(() => {
                if (confirm("✅ تم فتح واتساب!\n\nهل تريد تفريغ السلة الآن؟")) {
                    cart = [];
                    localStorage.setItem("cart", JSON.stringify(cart));
                    renderCart();
                }
            }, 1500);
        }

        renderCart();
    </script>
</body>
</html>
